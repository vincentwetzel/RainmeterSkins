[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!Delay 100][!Move (#SCREENAREAX@4#) (#SCREENAREAY@4#)]

[Variables]
WallpaperName=[Loading...]

[MeterWallpaper]
Meter=String
Text=#WallpaperName#
X=960
Y=(1080-70)
FontSize=14
FontColor=255,255,255,255
StringEffect=Shadow
FontEffectColor=0,0,0,150
SolidColor=0,0,0,0
DynamicVariables=1
StringAlign=Center

[MeasureSetActive]
Measure=Calc
OnRefreshAction=[!SetVariable IsActive "1"]
