[Rainmeter]
Update=5000
DynamicWindowSize=1
AccurateText=1
OnLoadAction=[!CommandMeasure MeasureGetWallpapers "Run"]
OnUpdateAction=[!CommandMeasure MeasureGetWallpapers "Run"]

[MeasureGetWallpapers]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "C:\Rainmeter\Skins\@Resources\Get-Wallpapers.ps1"
OutputType=ANSI
UpdateDivider=1
IfCondition=1
IfTrueAction=[!CommandMeasure MeasureGetWallpapers "Run"]

[MeasurePush]
Measure=Script
ScriptFile=#CURRENTPATH#PushWallpapers.lua

[MeterDummy]
Meter=String
Text=""
FontSize=1
FontColor=0,0,0,0
Hidden=0