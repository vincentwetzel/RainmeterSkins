[Rainmeter]
Update=3000
DynamicWindowSize=1
AccurateText=1
OnLoadAction=[!CommandMeasure MeasureGetWallpapers "Run"]
OnUpdateAction=[!CommandMeasure MeasureGetWallpapers "Run"]

[MeasureGetWallpapers]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "C:\Rainmeter\Skins\@Resources\Get-Wallpapers.ps1" "Center=#SCREENAREAX@1#,#SCREENAREAY@1#,#SCREENAREAWIDTH@1#,#SCREENAREAHEIGHT@1#" "Top=#SCREENAREAX@2#,#SCREENAREAY@2#,#SCREENAREAWIDTH@2#,#SCREENAREAHEIGHT@2#" "Right=#SCREENAREAX@3#,#SCREENAREAY@3#,#SCREENAREAWIDTH@3#,#SCREENAREAHEIGHT@3#" "Left=#SCREENAREAX@4#,#SCREENAREAY@4#,#SCREENAREAWIDTH@4#,#SCREENAREAHEIGHT@4#"
OutputType=ANSI
UpdateDivider=1
DynamicVariables=1
IfCondition=1
IfTrueAction=[!CommandMeasure MeasureGetWallpapers "Run"]

[MeasurePush]
Measure=Script
ScriptFile=#CURRENTPATH#PushWallpapers.lua

[MeterDummy]
Meter=String
Text=""
FontSize=1
FontColor=0,0,0,0
Hidden=0
